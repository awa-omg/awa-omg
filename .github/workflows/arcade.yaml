name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Pacman Graph
        uses: readme/intergalactic@main
        with:
          user: ${{ github.repository_owner }}
          style: puzzle-bobble
          outputs: |
            dist/puzzle-bobble-contribution-graph.svg
            dist/puzzle-bobble-contribution-graph-dark.svg?theme=dark

      - name: Push to Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
